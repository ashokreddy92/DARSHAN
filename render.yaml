services:
  # 1. Backend Web Service
  - type: web
    name: darshanease-backend
    env: node
    buildCommand: npm install --prefix backend
    startCommand: node backend/server.js
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false # User will provide this in Render dashboard
      - key: JWT_SECRET
        generateValue: true # Render will auto-generate a secure key

  # 2. Frontend Static Site
  - type: static
    name: darshanease-frontend
    buildCommand: npm install --prefix frontend && npm run build --prefix frontend
    publishPath: frontend/dist
    plan: free
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
